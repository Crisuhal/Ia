<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi IA Personal</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 10px; text-align: left; background: #1e1e1e; border-radius: 8px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .bot { color: #00ffcc; font-weight: bold; }
        .user { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🤖 Mi Asistente IA</h2>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Escribí algo...">
    <button onclick="enviar()">Enviar</button>

    <script>
        // PEGA TU API KEY AQUÍ ABAJO
        const API_KEY = "AIzaSyBkz3GrL4r80Xk1Bn4UEZhScALe8ehqa0o"; 

        async function enviar() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const mensaje = input.value;
            if (!mensaje) return;

            chat.innerHTML += `<p class="user">Vos: ${mensaje}</p>`;
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: mensaje }] }]
                    })
                });

                const data = await response.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<p class="bot">IA: ${respuestaIA}</p>`;
            } catch (error) {
                chat.innerHTML += `<p style="color:red">Error: Revisá tu API Key o conexión.</p>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
